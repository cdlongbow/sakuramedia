# SakuraMedia Flatpak manifest
#
# Build strategy:
#   1. CI 先跑 `flutter build linux --release` 得到裸 bundle
#   2. 将 build/linux/x64/release/bundle/ 拷到 packaging/flatpak/bundle/
#   3. flatpak-builder 用本文件把 bundle 装进 flatpak 沙箱,并从源码 build libmpv,
#      运行时通过 org.freedesktop.Platform.ffmpeg-full 扩展获得全 codec
#
# 本地打包(需先装 flatpak flatpak-builder):
#   flutter build linux --release
#   rsync -a --delete build/linux/x64/release/bundle/ packaging/flatpak/bundle/
#   bash packaging/flatpak/scripts/generate-icons.sh
#   flatpak-builder --user --force-clean --install-deps-from=flathub \
#     --repo=packaging/flatpak/repo packaging/flatpak/build-dir \
#     packaging/flatpak/io.github.tinypinglite.SakuraMedia.yml
#   flatpak build-bundle packaging/flatpak/repo \
#     sakuramedia.flatpak io.github.tinypinglite.SakuraMedia

app-id: io.github.tinypinglite.SakuraMedia
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: sakuramedia

# 沙箱最小权限集。文件选择器/URL 打开走 xdg-desktop-portal(自动可用),
# 不需要 --filesystem 声明。用户配置/缓存落 ~/.var/app/<app-id>/(沙箱私有),
# 也无需显式挂载。
finish-args:
  - --share=network             # HTTP/SSE 请求后端
  - --share=ipc                 # X11/Wayland 共享内存
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio         # 音频输出(pipewire 系统自动兼容)
  - --device=dri                # GPU 渲染 + VA-API 硬解
  - --talk-name=org.freedesktop.secrets  # flutter_secure_storage → libsecret

# ffmpeg-full 扩展:freedesktop-sdk 基础 runtime 只带阉割版 ffmpeg(无 H.264/HEVC 等),
# 通过此扩展把带全套 codec 的库挂到 /app/lib/ffmpeg/。
# add-ld-path='.' 会把该目录追加到 LD_LIBRARY_PATH,
# libmpv 运行时 dlopen 就命中全 codec 版本(soname 兼容)。
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    version: '24.08'
    directory: lib/ffmpeg
    add-ld-path: '.'
    no-autodownload: false
    autodelete: false

cleanup-commands:
  # 扩展挂载点必须提前存在
  - mkdir -p /app/lib/ffmpeg

modules:
  # libmpv 0.39:仅 build libmpv,关 CLI/lua/js/文档,追求最小体积。
  # 编译时链 SDK 基础 ffmpeg;运行时被 ffmpeg-full extension 覆盖(soname 一致)。
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Dcplugins=disabled
      - -Dbuild-date=false
      - -Dhtml-build=disabled
      - -Dmanpage-build=disabled
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
      - /share/man
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.39.0
        # commit 锁定到 v0.39.0 对应的 sha,避免 tag 被上游移动。
        # 升级 mpv 时:改 tag 后跑
        #   git ls-remote https://github.com/mpv-player/mpv.git refs/tags/vX.Y.Z
        # 把返回的 sha 填到 commit。
        commit: 63329f68c61c3511f8d4ca2d57c972d0e703eb63

  # Flutter Linux 产物 + 桌面集成资源。
  # source type: dir 会把 packaging/flatpak/ 整个目录复制到构建沙箱,
  # bundle/ 由 CI 步骤在打 flatpak 前 rsync 好。
  - name: sakuramedia
    buildsystem: simple
    build-commands:
      # 应用 bundle:sakuramedia 二进制 + data/(flutter_assets) + lib/(plugin so)
      - mkdir -p /app/lib/sakuramedia
      - cp -a bundle/. /app/lib/sakuramedia/
      # /app/bin/sakuramedia 启动壳
      - install -Dm755 launcher.sh /app/bin/sakuramedia
      # 桌面集成
      - install -Dm644 io.github.tinypinglite.SakuraMedia.desktop
          /app/share/applications/io.github.tinypinglite.SakuraMedia.desktop
      - install -Dm644 io.github.tinypinglite.SakuraMedia.metainfo.xml
          /app/share/metainfo/io.github.tinypinglite.SakuraMedia.metainfo.xml
      # 图标(scripts/generate-icons.sh 从 macos icon-512@2x.png 缩出)
      - install -Dm644 icons/128.png
          /app/share/icons/hicolor/128x128/apps/io.github.tinypinglite.SakuraMedia.png
      - install -Dm644 icons/256.png
          /app/share/icons/hicolor/256x256/apps/io.github.tinypinglite.SakuraMedia.png
      - install -Dm644 icons/512.png
          /app/share/icons/hicolor/512x512/apps/io.github.tinypinglite.SakuraMedia.png
    sources:
      - type: dir
        path: .
