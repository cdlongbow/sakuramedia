name: Release Linux

# 打包策略:先在 Ubuntu runner 上 flutter build linux --release 得到裸 bundle,
# 再用 apt 装的 flatpak/flatpak-builder 把 bundle + 从源码 build 的 libmpv 装进
# flatpak 沙箱(runtime = org.freedesktop.Platform//24.08 + ffmpeg-full extension),
# 打成单文件 .flatpak 上传 Release。

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Linux Flatpak and publish release
    runs-on: ubuntu-latest

    env:
      APP_ID: io.github.tinypinglite.SakuraMedia
      MANIFEST: packaging/flatpak/io.github.tinypinglite.SakuraMedia.yml
      BUNDLE_NAME: sakuramedia-linux-${{ github.ref_name }}.flatpak

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3
          cache: true

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libmpv-dev libsecret-1-dev libjsoncpp-dev \
            imagemagick rsync

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install pub dependencies
        run: flutter pub get

      - name: Run tests before release
        run: flutter test

      - name: Build Flutter Linux release
        run: |
          # 从 git tag 注入版本:v0.3.7 -> 0.3.7;pubspec 的 version 仅占位
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build linux --release --build-name="$VERSION"

      - name: Stage Flutter bundle into flatpak workspace
        run: |
          mkdir -p packaging/flatpak/bundle
          rsync -a --delete build/linux/x64/release/bundle/ packaging/flatpak/bundle/
          ls -la packaging/flatpak/bundle/

      - name: Generate icons for flatpak
        run: bash packaging/flatpak/scripts/generate-icons.sh

      - name: Install flatpak + flatpak-builder
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --version
          flatpak-builder --version

      - name: Add flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Install flatpak platform / SDK / ffmpeg-full extension
        run: |
          flatpak install --user --noninteractive --assumeyes flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform.ffmpeg-full//24.08

      - name: Cache flatpak-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .flatpak-builder
          key: flatpak-builder-${{ runner.os }}-${{ hashFiles(env.MANIFEST) }}
          restore-keys: |
            flatpak-builder-${{ runner.os }}-

      - name: Build flatpak (manifest → repo)
        run: |
          mkdir -p dist
          flatpak-builder \
            --user \
            --force-clean \
            --install-deps-from=flathub \
            --repo=repo \
            build-dir \
            "${MANIFEST}"

      - name: Export .flatpak bundle
        run: |
          flatpak build-bundle repo "dist/${BUNDLE_NAME}" "${APP_ID}"

      - name: Generate sha256 checksum
        run: |
          cd dist
          sha256sum "${BUNDLE_NAME}" > "${BUNDLE_NAME}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-${{ github.ref_name }}
          path: |
            dist/${{ env.BUNDLE_NAME }}
            dist/${{ env.BUNDLE_NAME }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: sakuramedia ${{ github.ref_name }}
          # Release notes 由 macOS workflow 独占生成,其它平台设 false 避免重复
          generate_release_notes: false
          files: |
            dist/${{ env.BUNDLE_NAME }}
            dist/${{ env.BUNDLE_NAME }}.sha256
